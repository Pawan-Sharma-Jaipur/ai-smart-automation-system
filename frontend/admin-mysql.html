<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - AI Automation</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 12px; margin-bottom: 30px; }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab { padding: 12px 24px; background: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .tab.active { background: #667eea; color: white; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; overflow-x: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-card h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
        .stat-card .value { font-size: 36px; font-weight: bold; color: #667eea; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f7fafc; padding: 12px; text-align: left; font-weight: 600; color: #4a5568; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-user { background: #c6f6d5; color: #22543d; }
        .badge-viewer { background: #e2e8f0; color: #4a5568; }
        .loading { text-align: center; padding: 40px; color: #a0aec0; }
        select { padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_URL = 'http://localhost:3005';
        const ROLE_LEVELS = { SYSTEM_ADMIN: 5, ORG_ADMIN: 4, TEAM_LEAD: 3, DEVELOPER: 2, VIEWER: 1 };

        const redirectToLogin = () => {
            localStorage.clear();
            window.location.href = 'face-login-mysql.html';
        };

        const redirectToDashboard = () => {
            window.location.href = 'dashboard-mysql.html';
        };

        const getSession = () => ({
            token: localStorage.getItem('token'),
            user: JSON.parse(localStorage.getItem('user') || 'null')
        });

        const getAuthHeaders = () => {
            const { token } = getSession();
            return token ? { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` } : null;
        };

        const isUnauthorized = (response) => response.status === 401 || response.status === 403;

        if (!getSession().token || !getSession().user) redirectToLogin();

        function AdminPanel() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [users, setUsers] = useState([]);
            const [logs, setLogs] = useState([]);
            const [predictions, setPredictions] = useState([]);
            const [stats, setStats] = useState({});
            const [loading, setLoading] = useState(true);
            const [currentUser, setCurrentUser] = useState(getSession().user);

            useEffect(() => {
                let mounted = true;
                const init = async () => {
                    const verified = await verifySession();
                    if (verified && mounted) loadData();
                };
                init();
                return () => { mounted = false; };
            }, [activeTab]);

            const verifySession = async () => {
                const session = getSession();
                if (!session.token || !session.user) {
                    redirectToLogin();
                    return false;
                }
                try {
                    const res = await fetch(`${API_URL}/api/auth/verify`, { headers: { Authorization: `Bearer ${session.token}` } });
                    if (isUnauthorized(res)) {
                        redirectToLogin();
                        return false;
                    }
                    const data = await res.json();
                    if (!data.success) {
                        redirectToLogin();
                        return false;
                    }
                    if ((ROLE_LEVELS[data.user?.role] || 0) < ROLE_LEVELS.ORG_ADMIN) {
                        alert('Access denied: admin privileges required');
                        redirectToDashboard();
                        return false;
                    }
                    localStorage.setItem('user', JSON.stringify(data.user));
                    setCurrentUser(data.user);
                    return true;
                } catch (error) {
                    console.error('Session verify failed:', error);
                    alert('Could not verify your session. Please login again.');
                    redirectToLogin();
                    return false;
                }
            };

            const loadData = async () => {
                setLoading(true);
                try {
                    const authHeaders = getAuthHeaders();
                    if (!authHeaders) {
                        redirectToLogin();
                        return;
                    }
                    let res;
                    if (activeTab === 'dashboard') {
                        res = await fetch(`${API_URL}/api/admin/dashboard`, { headers: authHeaders });
                        if (isUnauthorized(res)) return redirectToLogin();
                        const data = await res.json();
                        if (data.success) setStats(data.stats);
                    } else if (activeTab === 'users') {
                        res = await fetch(`${API_URL}/api/users`, { headers: authHeaders });
                        if (isUnauthorized(res)) return redirectToLogin();
                        const data = await res.json();
                        if (data.success) setUsers(data.users);
                    } else if (activeTab === 'logs') {
                        res = await fetch(`${API_URL}/api/logs`, { headers: authHeaders });
                        if (isUnauthorized(res)) return redirectToLogin();
                        const data = await res.json();
                        if (data.success) setLogs(data.logs);
                    } else if (activeTab === 'predictions') {
                        res = await fetch(`${API_URL}/api/ai/predictions`, { headers: authHeaders });
                        if (isUnauthorized(res)) return redirectToLogin();
                        const data = await res.json();
                        if (data.success) setPredictions(data.predictions);
                    }
                } catch (error) {
                    console.error('Load error:', error);
                } finally {
                    setLoading(false);
                }
            };

            const changeRole = async (userId, newRole) => {
                try {
                    const authHeaders = getAuthHeaders();
                    const res = await fetch(`${API_URL}/api/users/${userId}/role`, {
                        method: 'PUT',
                        headers: authHeaders,
                        body: JSON.stringify({ role: newRole })
                    });
                    if (isUnauthorized(res)) return redirectToLogin();
                    const data = await res.json();
                    if (data.success) {
                        alert('Role updated successfully');
                        loadData();
                        return;
                    }
                    alert(data.error || 'Role update failed');
                } catch (error) {
                    alert('Error updating role');
                }
            };

            const logout = async () => {
                try {
                    const authHeaders = getAuthHeaders();
                    if (authHeaders) {
                        await fetch(`${API_URL}/api/auth/logout`, { method: 'POST', headers: authHeaders });
                    }
                } catch (error) {
                    console.error('Logout error:', error);
                } finally {
                    redirectToLogin();
                }
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>Admin Control Panel</h1>
                        <p>Logged in as <strong>{currentUser?.username}</strong> ({currentUser?.role}) | <span style={{ cursor: 'pointer', textDecoration: 'underline' }} onClick={logout}>Logout</span></p>
                    </div>
                    <div className="tabs">
                        <button className={`tab ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => setActiveTab('dashboard')}>Dashboard</button>
                        <button className={`tab ${activeTab === 'users' ? 'active' : ''}`} onClick={() => setActiveTab('users')}>Users</button>
                        <button className={`tab ${activeTab === 'predictions' ? 'active' : ''}`} onClick={() => setActiveTab('predictions')}>Predictions</button>
                        <button className={`tab ${activeTab === 'logs' ? 'active' : ''}`} onClick={() => setActiveTab('logs')}>Activity Logs</button>
                    </div>
                    {loading ? <div className="loading">Loading...</div> : <>
                        {activeTab === 'dashboard' && <DashboardTab stats={stats} />}
                        {activeTab === 'users' && <UsersTab users={users} onChangeRole={changeRole} />}
                        {activeTab === 'predictions' && <PredictionsTab predictions={predictions} />}
                        {activeTab === 'logs' && <LogsTab logs={logs} />}
                    </>}
                </div>
            );
        }

        function DashboardTab({ stats }) {
            return (
                <>
                    <div className="stats-grid">
                        <div className="stat-card"><h3>Total Users</h3><div className="value">{stats.totalUsers || 0}</div></div>
                        <div className="stat-card"><h3>Total Predictions</h3><div className="value">{stats.totalPredictions || 0}</div></div>
                        <div className="stat-card"><h3>Activity Logs</h3><div className="value">{stats.totalLogs || 0}</div></div>
                        <div className="stat-card"><h3>System Status</h3><div className="value" style={{ fontSize: '24px', color: '#48bb78' }}>Online</div></div>
                    </div>
                    <div className="card">
                        <h2 style={{ marginBottom: '20px' }}>Recent Activity</h2>
                        <table>
                            <thead><tr><th>User</th><th>Action</th><th>Time</th></tr></thead>
                            <tbody>
                                {stats.recentActivity?.length ? stats.recentActivity.map((log, index) => (
                                    <tr key={index}>
                                        <td>{log.username || 'System'}</td>
                                        <td>{log.action}</td>
                                        <td>{new Date(log.created_at).toLocaleString()}</td>
                                    </tr>
                                )) : <tr><td colSpan="3" style={{ textAlign: 'center', color: '#a0aec0' }}>No recent activity</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </>
            );
        }

        function UsersTab({ users, onChangeRole }) {
            return (
                <div className="card">
                    <h2 style={{ marginBottom: '20px' }}>User Management</h2>
                    <table>
                        <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody>
                            {users.map((user) => (
                                <tr key={user.id}>
                                    <td>{user.id}</td>
                                    <td><strong>{user.username}</strong></td>
                                    <td>{user.email}</td>
                                    <td>{user.role}</td>
                                    <td><span className={`badge ${user.status === 'active' ? 'badge-user' : 'badge-viewer'}`}>{user.status || 'active'}</span></td>
                                    <td>
                                        <select defaultValue={user.role} onChange={(event) => onChangeRole(user.id, event.target.value)}>
                                            <option value="SYSTEM_ADMIN">SYSTEM_ADMIN</option>
                                            <option value="ORG_ADMIN">ORG_ADMIN</option>
                                            <option value="TEAM_LEAD">TEAM_LEAD</option>
                                            <option value="DEVELOPER">DEVELOPER</option>
                                            <option value="VIEWER">VIEWER</option>
                                        </select>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        function PredictionsTab({ predictions }) {
            return (
                <div className="card">
                    <h2 style={{ marginBottom: '20px' }}>AI Predictions History</h2>
                    <table>
                        <thead><tr><th>ID</th><th>User</th><th>Prediction</th><th>Confidence</th><th>Input</th><th>Time</th></tr></thead>
                        <tbody>
                            {predictions.length ? predictions.map((pred) => (
                                <tr key={pred.id}>
                                    <td>{pred.id}</td>
                                    <td>{pred.username}</td>
                                    <td><strong>{pred.prediction}</strong></td>
                                    <td>{pred.confidence}%</td>
                                    <td>H:{pred.hour} U:{pred.usage_count} C:{pred.context}</td>
                                    <td>{new Date(pred.created_at).toLocaleString()}</td>
                                </tr>
                            )) : <tr><td colSpan="6" style={{ textAlign: 'center', color: '#a0aec0' }}>No predictions found</td></tr>}
                        </tbody>
                    </table>
                </div>
            );
        }

        function LogsTab({ logs }) {
            return (
                <div className="card">
                    <h2 style={{ marginBottom: '20px' }}>Activity Logs</h2>
                    <table>
                        <thead><tr><th>ID</th><th>User</th><th>Action</th><th>Details</th><th>Time</th></tr></thead>
                        <tbody>
                            {logs.length ? logs.map((log) => (
                                <tr key={log.id}>
                                    <td>{log.id}</td>
                                    <td>{log.username || 'System'}</td>
                                    <td>{log.action}</td>
                                    <td>{log.details || '-'}</td>
                                    <td>{new Date(log.created_at).toLocaleString()}</td>
                                </tr>
                            )) : <tr><td colSpan="5" style={{ textAlign: 'center', color: '#a0aec0' }}>No logs found</td></tr>}
                        </tbody>
                    </table>
                </div>
            );
        }

        ReactDOM.render(<AdminPanel />, document.getElementById('root'));
    </script>
</body>
</html>

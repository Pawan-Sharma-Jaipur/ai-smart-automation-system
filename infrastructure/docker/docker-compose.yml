version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ai-automation-db
    environment:
      POSTGRES_DB: ai_automation_enterprise
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seeds/01_initial_data.sql:/docker-entrypoint-initdb.d/02-seeds.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai-automation-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      AI_SERVICE_URL: http://ai-service:3002
      USER_SERVICE_URL: http://user-service:3003
      BLOCKCHAIN_SERVICE_URL: http://blockchain-service:3004
    depends_on:
      - auth-service
      - ai-service
    restart: unless-stopped

  # Auth Service
  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/ai_automation_enterprise
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # AI Service
  ai-service:
    build: ./services/ai-service
    container_name: ai-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MODEL_PATH: /app/models
    volumes:
      - ./services/ai-service/models:/app/models
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: ai-automation-network

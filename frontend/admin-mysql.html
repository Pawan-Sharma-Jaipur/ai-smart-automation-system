<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - AI Automation</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background:
            radial-gradient(circle at top left, rgba(59,130,246,0.14), transparent 30%),
            radial-gradient(circle at top right, rgba(16,185,129,0.10), transparent 25%),
            linear-gradient(180deg, #edf4ff 0%, #f6f9fc 50%, #eef2f7 100%); }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #0f2f68 0%, #1d4ed8 55%, #38bdf8 100%); color: white; padding: 30px; border-radius: 18px; margin-bottom: 30px; box-shadow: 0 20px 45px rgba(15,47,104,0.25); }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab { padding: 12px 24px; background: rgba(255,255,255,0.92); border: 1px solid #d6e2f0; border-radius: 999px; cursor: pointer; font-weight: 600; transition: all 0.3s; color: #234; }
        .tab.active { background: #1d4ed8; color: white; border-color: #1d4ed8; box-shadow: 0 8px 20px rgba(29,78,216,0.25); }
        .card { background: rgba(255,255,255,0.96); padding: 25px; border-radius: 18px; box-shadow: 0 12px 32px rgba(15,23,42,0.08); margin-bottom: 20px; overflow-x: auto; border: 1px solid rgba(214,226,240,0.9); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%); padding: 22px; border-radius: 18px; box-shadow: 0 12px 30px rgba(29,78,216,0.08); border: 1px solid #d7e3f4; }
        .stat-card h3 { color: #526277; font-size: 14px; margin-bottom: 10px; }
        .stat-card .value { font-size: 36px; font-weight: bold; color: #1d4ed8; }
        .use-case-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .use-case-card { background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%); border: 1px solid #d7e3f4; padding: 22px; border-radius: 14px; box-shadow: 0 8px 24px rgba(102,126,234,0.08); }
        .use-case-card h3 { color: #2d3748; font-size: 18px; margin-bottom: 10px; }
        .use-case-card p { color: #4a5568; line-height: 1.6; font-size: 14px; margin-bottom: 12px; }
        .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .pill { display: inline-block; padding: 6px 10px; background: #e9f2ff; color: #365899; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .sales-banner { background: linear-gradient(135deg, #1f4b99 0%, #3b82f6 100%); color: white; padding: 24px; border-radius: 14px; margin-bottom: 20px; box-shadow: 0 12px 28px rgba(31,75,153,0.2); }
        .sales-banner h2 { font-size: 24px; margin-bottom: 10px; }
        .sales-banner p { line-height: 1.7; color: rgba(255,255,255,0.92); }
        .value-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
        .value-item { padding: 18px; background: #f8fafc; border-radius: 12px; border-left: 4px solid #667eea; }
        .value-item strong { display: block; color: #1a202c; margin-bottom: 6px; }
        .sales-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; margin-bottom: 20px; }
        .roi-list { display: grid; gap: 14px; }
        .roi-item { padding: 16px; border-radius: 14px; background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%); border: 1px solid #dbe7f5; }
        .roi-item strong { display: block; color: #0f2f68; margin-bottom: 6px; }
        .pricing-card { background: linear-gradient(180deg, #0f172a 0%, #1e3a8a 100%); color: white; border-radius: 18px; padding: 24px; box-shadow: 0 16px 36px rgba(15,23,42,0.25); }
        .pricing-card h3 { font-size: 22px; margin-bottom: 8px; }
        .pricing-tag { display: inline-block; padding: 6px 10px; border-radius: 999px; background: rgba(255,255,255,0.16); margin-bottom: 16px; font-size: 12px; font-weight: 700; letter-spacing: 0.04em; }
        .price-line { font-size: 30px; font-weight: 800; margin-bottom: 10px; }
        .price-note { color: rgba(255,255,255,0.85); line-height: 1.6; margin-bottom: 14px; }
        .pricing-list { display: grid; gap: 10px; margin-top: 14px; }
        .pricing-list div { padding: 10px 12px; background: rgba(255,255,255,0.08); border-radius: 12px; }
        .compare-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; }
        .compare-card { padding: 20px; border-radius: 16px; background: #fbfdff; border: 1px solid #d8e4f1; }
        .compare-card h3 { color: #123; margin-bottom: 10px; }
        .compare-card ul { margin: 0; padding-left: 18px; color: #4a5568; line-height: 1.8; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f7fafc; padding: 12px; text-align: left; font-weight: 600; color: #4a5568; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-user { background: #c6f6d5; color: #22543d; }
        .badge-viewer { background: #e2e8f0; color: #4a5568; }
        .loading { text-align: center; padding: 40px; color: #a0aec0; }
        select { padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; }
        @media (max-width: 900px) {
            .sales-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_URL = 'http://localhost:3005';
        const ROLE_LEVELS = { SYSTEM_ADMIN: 5, ORG_ADMIN: 4, TEAM_LEAD: 3, DEVELOPER: 2, VIEWER: 1 };

        const redirectToLogin = () => {
            localStorage.clear();
            window.location.href = 'face-login-mysql.html';
        };

        const redirectToDashboard = () => {
            window.location.href = 'dashboard-mysql.html';
        };

        const getSession = () => ({
            token: localStorage.getItem('token'),
            user: JSON.parse(localStorage.getItem('user') || 'null')
        });

        const getAuthHeaders = () => {
            const { token } = getSession();
            return token ? { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` } : null;
        };

        const isUnauthorized = (response) => response.status === 401 || response.status === 403;

        if (!getSession().token || !getSession().user) redirectToLogin();

        function AdminPanel() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [users, setUsers] = useState([]);
            const [logs, setLogs] = useState([]);
            const [predictions, setPredictions] = useState([]);
            const [stats, setStats] = useState({});
            const [loading, setLoading] = useState(true);
            const [currentUser, setCurrentUser] = useState(getSession().user);

            useEffect(() => {
                let mounted = true;
                const init = async () => {
                    const verified = await verifySession();
                    if (verified && mounted) loadData();
                };
                init();
                return () => { mounted = false; };
            }, [activeTab]);

            const verifySession = async () => {
                const session = getSession();
                if (!session.token || !session.user) {
                    redirectToLogin();
                    return false;
                }
                try {
                    const res = await fetch(`${API_URL}/api/auth/verify`, { headers: { Authorization: `Bearer ${session.token}` } });
                    if (isUnauthorized(res)) {
                        redirectToLogin();
                        return false;
                    }
                    const data = await res.json();
                    if (!data.success) {
                        redirectToLogin();
                        return false;
                    }
                    if ((ROLE_LEVELS[data.user?.role] || 0) < ROLE_LEVELS.ORG_ADMIN) {
                        alert('Access denied: admin privileges required');
                        redirectToDashboard();
                        return false;
                    }
                    localStorage.setItem('user', JSON.stringify(data.user));
                    setCurrentUser(data.user);
                    return true;
                } catch (error) {
                    console.error('Session verify failed:', error);
                    alert('Could not verify your session. Please login again.');
                    redirectToLogin();
                    return false;
                }
            };

            const loadData = async () => {
                setLoading(true);
                try {
                    const authHeaders = getAuthHeaders();
                    if (!authHeaders) {
                        redirectToLogin();
                        return;
                    }
                    let res;
                    if (activeTab === 'dashboard') {
                        res = await fetch(`${API_URL}/api/admin/dashboard`, { headers: authHeaders });
                        if (isUnauthorized(res)) return redirectToLogin();
                        const data = await res.json();
                        if (data.success) setStats(data.stats);
                    } else if (activeTab === 'users') {
                        res = await fetch(`${API_URL}/api/users`, { headers: authHeaders });
                        if (isUnauthorized(res)) return redirectToLogin();
                        const data = await res.json();
                        if (data.success) setUsers(data.users);
                    } else if (activeTab === 'logs') {
                        res = await fetch(`${API_URL}/api/logs`, { headers: authHeaders });
                        if (isUnauthorized(res)) return redirectToLogin();
                        const data = await res.json();
                        if (data.success) setLogs(data.logs);
                    } else if (activeTab === 'predictions') {
                        res = await fetch(`${API_URL}/api/ai/predictions`, { headers: authHeaders });
                        if (isUnauthorized(res)) return redirectToLogin();
                        const data = await res.json();
                        if (data.success) setPredictions(data.predictions);
                    }
                } catch (error) {
                    console.error('Load error:', error);
                } finally {
                    setLoading(false);
                }
            };

            const changeRole = async (userId, newRole) => {
                try {
                    const authHeaders = getAuthHeaders();
                    const res = await fetch(`${API_URL}/api/users/${userId}/role`, {
                        method: 'PUT',
                        headers: authHeaders,
                        body: JSON.stringify({ role: newRole })
                    });
                    if (isUnauthorized(res)) return redirectToLogin();
                    const data = await res.json();
                    if (data.success) {
                        alert('Role updated successfully');
                        loadData();
                        return;
                    }
                    alert(data.error || 'Role update failed');
                } catch (error) {
                    alert('Error updating role');
                }
            };

            const logout = async () => {
                try {
                    const authHeaders = getAuthHeaders();
                    if (authHeaders) {
                        await fetch(`${API_URL}/api/auth/logout`, { method: 'POST', headers: authHeaders });
                    }
                } catch (error) {
                    console.error('Logout error:', error);
                } finally {
                    redirectToLogin();
                }
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>Admin Control Panel</h1>
                        <p>Logged in as <strong>{currentUser?.username}</strong> ({currentUser?.role}) | <span style={{ cursor: 'pointer', textDecoration: 'underline' }} onClick={logout}>Logout</span></p>
                    </div>
                    <div className="tabs">
                        <button className={`tab ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => setActiveTab('dashboard')}>Dashboard</button>
                        <button className={`tab ${activeTab === 'users' ? 'active' : ''}`} onClick={() => setActiveTab('users')}>Users</button>
                        <button className={`tab ${activeTab === 'predictions' ? 'active' : ''}`} onClick={() => setActiveTab('predictions')}>Predictions</button>
                        <button className={`tab ${activeTab === 'logs' ? 'active' : ''}`} onClick={() => setActiveTab('logs')}>Activity Logs</button>
                    </div>
                    {loading ? <div className="loading">Loading...</div> : <>
                        {activeTab === 'dashboard' && <DashboardTab stats={stats} />}
                        {activeTab === 'users' && <UsersTab users={users} onChangeRole={changeRole} />}
                        {activeTab === 'predictions' && <PredictionsTab predictions={predictions} />}
                        {activeTab === 'logs' && <LogsTab logs={logs} />}
                    </>}
                </div>
            );
        }

        function DashboardTab({ stats }) {
            const productionUseCases = [
                {
                    title: 'Smart Office Automation',
                    description: 'Meeting hours, focus time, and workspace context ke basis par notification behavior automate karke distractions kam karta hai.',
                    tags: ['Focus Mode', 'Meeting Intelligence', 'Employee Productivity']
                },
                {
                    title: 'Enterprise Operations Monitoring',
                    description: 'Admins live users, predictions, and activity logs monitor karke issues ko jaldi detect kar sakte hain.',
                    tags: ['Central Visibility', 'Live Monitoring', 'Operational Control']
                },
                {
                    title: 'Compliance and Audit Readiness',
                    description: 'Har critical action log hota hai, isliye internal audits, client reporting, aur accountability easy ho jati hai.',
                    tags: ['Audit Trail', 'Security Review', 'Governance']
                },
                {
                    title: 'Role-Based Administration',
                    description: 'Organization admin alag users ko different access levels dekar secure delegation aur controlled rollout kar sakta hai.',
                    tags: ['RBAC', 'Delegation', 'Secure Access']
                }
            ];

            const businessValues = [
                { title: 'Reduce Distractions', text: 'Teams ko context-aware automation milta hai jo manual phone mode switching ko minimize karta hai.' },
                { title: 'Improve Oversight', text: 'Single admin console se user activity, predictions, aur service behavior samajhna simple ho jata hai.' },
                { title: 'Support Scale', text: 'MySQL-backed storage future reporting, historical analysis, aur multi-user deployments ke liye base provide karta hai.' },
                { title: 'Client Confidence', text: 'Dashboard directly show karta hai ki software sirf demo nahi, balki monitored and managed business workflow support karta hai.' }
            ];

            const roiDrivers = [
                { title: 'Lower Productivity Loss', text: 'Automated notification handling se meeting disruptions aur context switching reduce hota hai.' },
                { title: 'Faster Admin Decisions', text: 'Predictions, users, aur logs ek jagah hone se manual follow-up effort kam hota hai.' },
                { title: 'Better Governance', text: 'Role-based control aur audit trail regulated environments me trust build karte hain.' }
            ];

            const differentiation = [
                {
                    title: 'Why Clients Choose This',
                    points: [
                        'Smart office workflow aur admin control ek hi product me milta hai',
                        'Usage visibility and audit history se management reporting easy hoti hai',
                        'Local deployment friendly architecture data-sensitive clients ke liye useful hai'
                    ]
                },
                {
                    title: 'Vs Basic Automation Tools',
                    points: [
                        'Sirf trigger-based automation nahi, context-aware prediction workflow bhi hai',
                        'Role hierarchy aur user management included hai',
                        'Admin dashboard buyer ko visible operational maturity dikhata hai'
                    ]
                }
            ];

            return (
                <>
                    <div className="stats-grid">
                        <div className="stat-card"><h3>Total Users</h3><div className="value">{stats.totalUsers || 0}</div></div>
                        <div className="stat-card"><h3>Total Predictions</h3><div className="value">{stats.totalPredictions || 0}</div></div>
                        <div className="stat-card"><h3>Activity Logs</h3><div className="value">{stats.totalLogs || 0}</div></div>
                        <div className="stat-card"><h3>System Status</h3><div className="value" style={{ fontSize: '24px', color: '#48bb78' }}>Online</div></div>
                    </div>
                    <div className="sales-banner">
                        <h2>Production-Ready Business Positioning</h2>
                        <p>
                            Ye admin panel client ko dikhata hai ki platform real deployment scenarios ke liye useful hai:
                            smart office automation, role-based governance, centralized monitoring, aur audit visibility.
                            Purchase discussion me isse operational value aur management control dono clearly present hote hain.
                        </p>
                    </div>
                    <div className="card">
                        <h2 style={{ marginBottom: '20px' }}>Production Use Cases</h2>
                        <div className="use-case-grid">
                            {productionUseCases.map((useCase) => (
                                <div className="use-case-card" key={useCase.title}>
                                    <h3>{useCase.title}</h3>
                                    <p>{useCase.description}</p>
                                    <div className="pill-row">
                                        {useCase.tags.map((tag) => <span className="pill" key={tag}>{tag}</span>)}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="card">
                        <h2 style={{ marginBottom: '20px' }}>Business Value For Clients</h2>
                        <div className="value-grid">
                            {businessValues.map((item) => (
                                <div className="value-item" key={item.title}>
                                    <strong>{item.title}</strong>
                                    <span>{item.text}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="sales-grid">
                        <div className="card">
                            <h2 style={{ marginBottom: '20px' }}>ROI And Purchase Justification</h2>
                            <div className="roi-list">
                                {roiDrivers.map((item) => (
                                    <div className="roi-item" key={item.title}>
                                        <strong>{item.title}</strong>
                                        <span>{item.text}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="pricing-card">
                            <div className="pricing-tag">CLIENT PROPOSAL READY</div>
                            <h3>Recommended Commercial Positioning</h3>
                            <div className="price-line">Automation Platform License</div>
                            <div className="price-note">
                                Is section ko sales discussion me use karke aap software ko productivity,
                                governance, aur operational control solution ke roop me present kar sakte ho.
                            </div>
                            <div className="pricing-list">
                                <div>One-time setup and deployment package</div>
                                <div>Role-based admin and reporting capability</div>
                                <div>Custom workflow tuning for office environment</div>
                                <div>Support and future analytics expansion</div>
                            </div>
                        </div>
                    </div>
                    <div className="card">
                        <h2 style={{ marginBottom: '20px' }}>Why Choose Us</h2>
                        <div className="compare-grid">
                            {differentiation.map((item) => (
                                <div className="compare-card" key={item.title}>
                                    <h3>{item.title}</h3>
                                    <ul>
                                        {item.points.map((point) => <li key={point}>{point}</li>)}
                                    </ul>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="card">
                        <h2 style={{ marginBottom: '20px' }}>Recent Activity</h2>
                        <table>
                            <thead><tr><th>User</th><th>Action</th><th>Time</th></tr></thead>
                            <tbody>
                                {stats.recentActivity?.length ? stats.recentActivity.map((log, index) => (
                                    <tr key={index}>
                                        <td>{log.username || 'System'}</td>
                                        <td>{log.action}</td>
                                        <td>{new Date(log.created_at).toLocaleString()}</td>
                                    </tr>
                                )) : <tr><td colSpan="3" style={{ textAlign: 'center', color: '#a0aec0' }}>No recent activity</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </>
            );
        }

        function UsersTab({ users, onChangeRole }) {
            return (
                <div className="card">
                    <h2 style={{ marginBottom: '20px' }}>User Management</h2>
                    <table>
                        <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody>
                            {users.map((user) => (
                                <tr key={user.id}>
                                    <td>{user.id}</td>
                                    <td><strong>{user.username}</strong></td>
                                    <td>{user.email}</td>
                                    <td>{user.role}</td>
                                    <td><span className={`badge ${user.status === 'active' ? 'badge-user' : 'badge-viewer'}`}>{user.status || 'active'}</span></td>
                                    <td>
                                        <select defaultValue={user.role} onChange={(event) => onChangeRole(user.id, event.target.value)}>
                                            <option value="SYSTEM_ADMIN">SYSTEM_ADMIN</option>
                                            <option value="ORG_ADMIN">ORG_ADMIN</option>
                                            <option value="TEAM_LEAD">TEAM_LEAD</option>
                                            <option value="DEVELOPER">DEVELOPER</option>
                                            <option value="VIEWER">VIEWER</option>
                                        </select>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        function PredictionsTab({ predictions }) {
            return (
                <div className="card">
                    <h2 style={{ marginBottom: '20px' }}>AI Predictions History</h2>
                    <table>
                        <thead><tr><th>ID</th><th>User</th><th>Prediction</th><th>Confidence</th><th>Input</th><th>Time</th></tr></thead>
                        <tbody>
                            {predictions.length ? predictions.map((pred) => (
                                <tr key={pred.id}>
                                    <td>{pred.id}</td>
                                    <td>{pred.username}</td>
                                    <td><strong>{pred.prediction}</strong></td>
                                    <td>{pred.confidence}%</td>
                                    <td>H:{pred.hour} U:{pred.usage_count} C:{pred.context}</td>
                                    <td>{new Date(pred.created_at).toLocaleString()}</td>
                                </tr>
                            )) : <tr><td colSpan="6" style={{ textAlign: 'center', color: '#a0aec0' }}>No predictions found</td></tr>}
                        </tbody>
                    </table>
                </div>
            );
        }

        function LogsTab({ logs }) {
            return (
                <div className="card">
                    <h2 style={{ marginBottom: '20px' }}>Activity Logs</h2>
                    <table>
                        <thead><tr><th>ID</th><th>User</th><th>Action</th><th>Details</th><th>Time</th></tr></thead>
                        <tbody>
                            {logs.length ? logs.map((log) => (
                                <tr key={log.id}>
                                    <td>{log.id}</td>
                                    <td>{log.username || 'System'}</td>
                                    <td>{log.action}</td>
                                    <td>{log.details || '-'}</td>
                                    <td>{new Date(log.created_at).toLocaleString()}</td>
                                </tr>
                            )) : <tr><td colSpan="5" style={{ textAlign: 'center', color: '#a0aec0' }}>No logs found</td></tr>}
                        </tbody>
                    </table>
                </div>
            );
        }

        ReactDOM.render(<AdminPanel />, document.getElementById('root'));
    </script>
</body>
</html>

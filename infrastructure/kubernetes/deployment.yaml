apiVersion: v1
kind: Namespace
metadata:
  name: ai-automation

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: ai-automation
data:
  AUTH_SERVICE_URL: "http://auth-service:3001"
  AI_SERVICE_URL: "http://ai-service:3002"
  USER_SERVICE_URL: "http://user-service:3003"
  BLOCKCHAIN_SERVICE_URL: "http://blockchain-service:3004"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ai-automation
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: ai-automation/api-gateway:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: app-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ai-automation
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 3000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: ai-automation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-service
        image: ai-automation/ai-service:latest
        ports:
        - containerPort: 3002
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: ai-automation
spec:
  selector:
    app: ai-service
  ports:
  - port: 3002
    targetPort: 3002

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: ai-automation
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
